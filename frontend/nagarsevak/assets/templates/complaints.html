<!-- Complaints list view template -->
<section class="view active" id="complaintsView" data-view-panel="complaints">
  <div class="page-heading">
    <div>
      <p id="complaintsWardLabel">Ward 1</p>
      <h2 data-i18n="complaintsTitle">वॉर्ड तक्रारी</h2>
    </div>
    <span class="locked-pill"><i class="fa-solid fa-lock"></i><span data-i18n="lockedWard">वॉर्ड लॉक आहे</span></span>
  </div>

  <section class="filters-panel">
    <label class="search-field">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="searchInput" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="नाव, तक्रार किंवा क्रमांक शोधा">
    </label>
    <select id="categoryFilter" aria-label="Category filter"></select>
    <select id="statusFilter">
      <option value="all" data-i18n="filterAll">सर्व स्थिती</option>
      <option value="pending" data-i18n="filterPending">प्रलंबित</option>
      <option value="progress" data-i18n="filterProgress">कारवाई सुरू</option>
      <option value="resolved" data-i18n="filterResolved">पूर्ण</option>
    </select>
  </section>

  <section class="complaints-list" id="complaintsList" aria-label="वॉर्ड तक्रारी"></section>
</section>
